<header class="admin-header">

  <!-- Left: Hamburger + Page title -->
  <div class="header-left">
    <button class="hamburger" (click)="onToggle()" title="Toggle Sidebar">
      <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <div class="page-badge">
      <div class="page-badge-icon">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
      </div>
      <div>
        <span class="page-title">Admin Panel</span>
        <span class="page-sub">MessMate Control Center</span>
      </div>
    </div>
  </div>

  <!-- Right: Clock, Notifications, Profile -->
  <div class="header-right">

    <div class="clock-chip">
      <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span class="clock-text">{{ currentTime }}</span>
    </div>

    <div class="notif-btn">
      <div class="notif-badge"></div>
      <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C10.8954 2 10 2.89543 10 4V4.11677C7.16434 4.58784 5 7.03732 5 10V14L3.60555 16.7889C3.15653 17.6869 3.80931 18.75 4.81442 18.75H19.1856C20.1907 18.75 20.8435 17.6869 20.3944 16.7889L19 14V10C19 7.03732 16.8357 4.58784 14 4.11677V4C14 2.89543 13.1046 2 12 2ZM9 20C9 21.6569 10.3431 23 12 23C13.6569 23 15 21.6569 15 20H9Z"/>
      </svg>
    </div>

    <div class="header-divider"></div>

    <div class="admin-profile">
      <div class="admin-avatar-ring">
        <div class="admin-avatar">A</div>
      </div>
      <div class="admin-info">
        <span class="admin-name">Administrator</span>
        <span class="admin-role">Super Admin</span>
      </div>
      <svg class="chevron" width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
    </div>

  </div>
</header>
