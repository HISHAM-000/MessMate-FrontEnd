<div class="staff-selection-container">

  <!-- Header Section -->
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">Staff <span class="accent">Directory</span></h1>
      <p class="page-subtitle">Select a mess establishment to manage its personnel and delivery team</p>
    </div>
  </div>

  <!-- 🔄 Loading State -->
  <div class="loading-grid" *ngIf="loading">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="shimmer"></div>
    </div>
  </div>

  <!-- ❌ Empty State -->
  <div class="empty-state reveal-item" *ngIf="!loading && messes.length === 0">
    <div class="empty-icon-box">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
    </div>
    <h2 class="empty-title">No Messes Available</h2>
    <p class="empty-desc">Messes must be approved before staff can be managed.</p>
  </div>

  <!-- 🔥 Mess Grid -->
  <div class="mess-grid" *ngIf="!loading && messes.length > 0">
    <div 
      class="mess-card reveal-item"
      *ngFor="let mess of messes; let i = index"
      [style.--delay]="(i * 0.08) + 's'"
      (click)="openStaff(mess.id)"
    >
      <div class="card-glow"></div>
      
      <div class="card-top">
        <div class="card-icon-box">
          <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </div>
        <div class="staff-count-tag">
          Active Mess
        </div>
      </div>
      
      <div class="card-content">
        <h3 class="mess-name">{{ mess.name }}</h3>
        <div class="location-info">
          <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span>{{ mess.city }}, {{ mess.state }}</span>
        </div>
      </div>

      <div class="card-footer">
        <div class="manage-btn">
          <span>Manage Staff</span>
          <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"/></svg>
        </div>
      </div>
    </div>
  </div>

</div>
