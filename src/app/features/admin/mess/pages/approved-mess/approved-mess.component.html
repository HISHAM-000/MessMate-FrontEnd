<div class="approved-container">

  <!-- Header Section -->
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">Approved <span class="accent">Messes</span></h1>
      <p class="page-subtitle">Manage and monitor verified platform partners</p>
    </div>
    <div class="header-stats" *ngIf="!loading">
      <div class="stat-pill">
        <span class="pill-label">Total Messes:</span>
        <span class="pill-value">{{ messes.length }}</span>
      </div>
    </div>
  </div>

  <!-- Search & Filter Area -->
  <div class="controls-row reveal-item" style="--delay: 0.1s">
    <div class="search-box">
      <svg class="search-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      <input type="text" placeholder="Search by name, city, or state..." disabled />
    </div>
    <div class="filter-actions">
      <button class="filter-btn" disabled>
        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4.5h18m-18 5h18m-18 5h18m-18 5h18"/></svg>
        <span>Filters</span>
      </button>
    </div>
  </div>

  <!-- 🔄 Loading State -->
  <div class="loading-grid" *ngIf="loading">
    <div class="skeleton-card" *ngFor="let i of [1,2,3,4,5,6]">
      <div class="skeleton-image"></div>
      <div class="skeleton-line title"></div>
      <div class="skeleton-line body"></div>
      <div class="skeleton-line body"></div>
    </div>
  </div>

  <!-- ❌ Empty State -->
  <div class="empty-state reveal-item" *ngIf="!loading && messes.length === 0">
    <div class="empty-icon-box">
      <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
    </div>
    <h2 class="empty-title">No Messes Found</h2>
    <p class="empty-desc">There are no approved messes on the platform yet.</p>
  </div>

  <!-- 🔥 Mess Grid -->
  <div class="mess-grid" *ngIf="!loading && messes.length > 0">
    <div class="mess-card reveal-item" 
         *ngFor="let mess of messes; let i = index" 
         [style.--delay]="(i * 0.08) + 's'"
         [routerLink]="['/admin/mess', mess.id]">
      
      <div class="card-banner">
        <div class="verified-badge">
          <svg width="12" height="12" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
          Verified
        </div>
        <div class="rating-badge">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
          {{ mess.rating || '4.5' }}
        </div>
      </div>

      <div class="card-content">
        <h3 class="mess-name">{{ mess.name }}</h3>
        
        <div class="location-group">
          <div class="loc-item">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span>{{ mess.city }}</span>
          </div>
          <div class="loc-item">
            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"></path></svg>
            <span>{{ mess.state }}</span>
          </div>
        </div>

        <div class="divider"></div>

        <div class="card-footer">
          <span class="view-link">
            View Details
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </span>
        </div>
      </div>

    </div>
  </div>

</div>
