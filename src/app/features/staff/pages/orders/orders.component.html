<div class="orders-page">

  <h2>Orders</h2>

  <!-- Tabs -->
  <div class="tabs">
    <button class="active">Pending</button>
    <button>Preparing</button>
    <button>Out For Delivery</button>
    <button>Delivered</button>
    <button>Cancelled</button>
  </div>

  <!-- Orders List -->
  <div class="orders-container">

    <!-- Order Card -->
    <div class="order-card">
      <div class="order-header">
        <h3>Order #123</h3>
        <span class="status pending">Pending</span>
      </div>

      <p><strong>Customer:</strong> John</p>
      <p><strong>Items:</strong> 3 items</p>
      <p><strong>Address:</strong> ABC Street</p>

      <!-- Actions -->
      <div class="actions">
        <button class="btn prepare">Prepare</button>
        <button class="btn cancel">Cancel</button>
        <button class="btn view">View</button>
      </div>
    </div>

    <!-- Repeat Order Card -->
    <div class="order-card">
      <div class="order-header">
        <h3>Order #124</h3>
        <span class="status preparing">Preparing</span>
      </div>

      <p><strong>Customer:</strong> Alex</p>
      <p><strong>Items:</strong> 2 items</p>
      <p><strong>Address:</strong> XYZ Street</p>

      <div class="actions">
        <button class="btn delivery">Out For Delivery</button>
        <button class="btn view">View</button>
      </div>
    </div>

  </div>
</div>
