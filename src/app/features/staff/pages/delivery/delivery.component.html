<div class="section">

  <h2>Delivery</h2>

  <!-- OTP CONFIRM -->
  <div class="otp-box">

    <div class="field">
      <label>Order ID</label>
      <input
        type="number"
        [(ngModel)]="orderId"
        placeholder="Enter Order ID"
      />
    </div>

    <div class="field">
      <label>OTP</label>
      <input
        type="text"
        [(ngModel)]="otp"
        placeholder="Enter OTP"
      />
    </div>

    <button (click)="confirmDelivery()">
      Confirm Delivery
    </button>

  </div>

  <!-- HISTORY -->
  <h3>Delivery History</h3>

  <!-- LOADING -->
  <div *ngIf="isLoading">Loading...</div>

  <!-- EMPTY STATE -->
  <div *ngIf="!isLoading && deliveries.length === 0">
    No deliveries found
  </div>

  <!-- LIST -->
  <div *ngIf="!isLoading && deliveries.length > 0">
    <div class="row" *ngFor="let d of deliveries">
      <span>#{{ d.orderId }}</span>
      <span>{{ d.customerName }}</span>
      <span>{{ d.status }}</span>
      <span>{{ d.deliveredAt | date:'short' }}</span>
    </div>
  </div>

</div>
