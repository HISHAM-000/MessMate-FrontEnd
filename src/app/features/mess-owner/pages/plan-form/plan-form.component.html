<div class="form-page fade-in">
  <div class="page-header slide-down">
    <div class="header-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
    </div>
    <div class="header-text">
      <h1>{{ isEditMode ? 'Edit Plan' : 'Create New Plan' }}</h1>
      <p>Manage pricing, duration, and meal details</p>
    </div>
  </div>

  <form #planForm="ngForm" class="form-card slide-up">
    
    <div class="section-title">
      <h3>Basic Settings</h3>
      <span>Core details of your subscription</span>
    </div>

    <div class="form-grid">
      <!-- Name -->
      <div class="input-group full">
        <input type="text" name="name" id="name" [(ngModel)]="plan.name" required placeholder=" " />
        <label for="name">Plan Name</label>
        <div class="input-border"></div>
      </div>

      <!-- Plan Type -->
      <div class="input-group">
        <select name="planType" id="planType" [(ngModel)]="plan.planType" required>
          <option [value]="1">Weekly</option>
          <option [value]="2">Monthly</option>
        </select>
        <label for="planType" class="select-label">Plan Type</label>
        <div class="input-border"></div>
      </div>

      <!-- Price -->
      <div class="input-group">
        <input type="number" name="price" id="price" [(ngModel)]="plan.price" required min="1" placeholder=" " />
        <label for="price">Price (₹)</label>
        <div class="input-border"></div>
      </div>

      <!-- Duration -->
      <div class="input-group">
        <input type="number" name="durationDays" id="durationDays" [(ngModel)]="plan.durationDays" required min="1" placeholder=" " />
        <label for="durationDays">Duration (Days)</label>
        <div class="input-border"></div>
      </div>

      <!-- Min Active -->
      <div class="input-group">
        <input type="number" name="minActiveDays" id="minActiveDays" [(ngModel)]="plan.minActiveDays" required min="1" placeholder=" " />
        <label for="minActiveDays">Min Active Days</label>
        <div class="input-border"></div>
      </div>
    </div>

    <div class="section-title mt-4">
      <h3>Meal Availability</h3>
      <span>Select which meals are included in this plan</span>
    </div>

    <div class="meals-grid">
      <label class="meal-checkbox" [class.selected]="plan.isBreakfast">
        <input type="checkbox" name="isBreakfast" [(ngModel)]="plan.isBreakfast" />
        <div class="meal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h20"/><path d="M12 2v10"/><path d="m4.93 4.93 4.24 4.24"/><path d="m14.83 9.17 4.24-4.24"/><path d="M12 22a8 8 0 0 0 8-8H4a8 8 0 0 0 8 8Z"/></svg>
        </div>
        <div class="meal-content">
          <h4>Breakfast</h4>
          <span class="meal-status">{{ plan.isBreakfast ? 'Included' : 'Excluded' }}</span>
        </div>
        <div class="check-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </label>

      <label class="meal-checkbox" [class.selected]="plan.isLunch">
        <input type="checkbox" name="isLunch" [(ngModel)]="plan.isLunch" />
        <div class="meal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
        </div>
        <div class="meal-content">
          <h4>Lunch</h4>
          <span class="meal-status">{{ plan.isLunch ? 'Included' : 'Excluded' }}</span>
        </div>
        <div class="check-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </label>

      <label class="meal-checkbox" [class.selected]="plan.isDinner">
        <input type="checkbox" name="isDinner" [(ngModel)]="plan.isDinner" />
        <div class="meal-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21a9 9 0 1 0-9-9c0 1.488.603 3.007 1.47 4.253.596.865 1.512 2.213 2.051 2.916A4.5 4.5 0 0 0 12 21Z"/><path d="M10 11v1.5a2.5 2.5 0 1 0 5 0V11"/><circle cx="12" cy="7" r="1"/></svg>
        </div>
        <div class="meal-content">
          <h4>Dinner</h4>
          <span class="meal-status">{{ plan.isDinner ? 'Included' : 'Excluded' }}</span>
        </div>
        <div class="check-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </label>
    </div>

    <div class="form-actions mt-5">
      <button type="button" class="btn btn-outline" routerLink="/owner/plans">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        Cancel
      </button>

      <button type="button" class="btn btn-primary" [disabled]="planForm.invalid" (click)="savePlan(planForm)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        {{ isEditMode ? 'Update Plan' : 'Save Plan' }}
      </button>
    </div>

  </form>
</div>
