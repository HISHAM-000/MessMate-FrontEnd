<div class="orders-page fade-in">

  <div class="page-header slide-down">
    <div class="header-content">
      <div class="header-icon-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <div class="header-text">
        <h1>Orders Management</h1>
        <p>View and manage all customer orders</p>
      </div>
    </div>
  </div>

  <div class="table-card slide-up stagger-1">

    <div class="table-responsive">
      <table class="saas-table">

        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Meal Type</th>
            <th>Date</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>

          <!-- ✅ DATA ROWS -->
          <tr *ngFor="let order of orders; let i = index" 
              class="slide-up" 
              [ngStyle]="{'animation-delay': (0.1 + i * 0.05) + 's'}">
            <td class="fw-bold">#{{ order.id }}</td>

            <td>
              <div class="customer-info">
                <div class="customer-name">{{ order.customerName }}</div>
                <small class="customer-address">{{ order.deliveryAddress }}</small>
              </div>
            </td>

            <td>
              <span class="meal-slot-badge">
                {{ order.mealSlot }}
              </span>
            </td>

            <td class="text-slate-600 fw-medium">
              {{ order.orderDate | date:'MMM d, y' }}
            </td>

            <td class="fw-bold text-slate-900">
              ₹{{ order.amount }}
            </td>

            <td>
              <!-- 🔥 SAFE CLASS -->
              <span class="status-pill"
                    [ngClass]="order.status?.toLowerCase()">
                <span class="status-dot"></span>
                {{ order.status }}
              </span>
            </td>
          </tr>

          <!-- EMPTY STATE -->
          <tr *ngIf="orders.length === 0">
            <td colspan="6">
              <div class="empty-state pop-in">
                <div class="empty-content">
                  <div class="empty-icon-wrap">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M16 16s-1.5-2-4-2-4 2-4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                  </div>
                  <p>No orders found yet</p>
                </div>
              </div>
            </td>
          </tr>

        </tbody>
      </table>
    </div>
  </div>
</div>
