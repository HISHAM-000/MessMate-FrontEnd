<div class="menu-day-container" *ngIf="!isLoading">

  <!-- NO MENU -->
  <div class="empty-state" *ngIf="!menuId">
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
    <h2>No Menu Created</h2>
    <p>You haven't set up a menu for this day yet.</p>
    <button class="btn btn-primary mt-4" (click)="createMenu()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
      Create Menu
    </button>
  </div>

  <!-- MENU EXISTS -->
  <div class="menu-sections" *ngIf="menuId">
    
    <!-- Breakfast Section -->
    <div class="meal-section">
      <div class="section-header">
        <h3>Breakfast</h3>
        <button class="btn btn-outline-primary btn-sm" (click)="openAdd(0)">+ Add Item</button>
      </div>
      <div class="meal-grid">
        <div class="meal-card" *ngFor="let item of breakfast">
          <div class="meal-info">
            <span class="diet-indicator" [class.veg]="item.isVeg" [class.nonveg]="!item.isVeg"></span>
            <h4>{{ item.name }}</h4>
          </div>
          <p class="meal-desc" *ngIf="item.description">{{ item.description }}</p>
          <div class="meal-actions">
            <button class="icon-btn" (click)="openEdit(item)" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button class="icon-btn danger" (click)="deleteItem(item.id)" title="Delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Lunch Section -->
    <div class="meal-section">
      <div class="section-header">
        <h3>Lunch</h3>
        <button class="btn btn-outline-primary btn-sm" (click)="openAdd(1)">+ Add Item</button>
      </div>
      <div class="meal-grid">
        <div class="meal-card" *ngFor="let item of lunch">
          <div class="meal-info">
            <span class="diet-indicator" [class.veg]="item.isVeg" [class.nonveg]="!item.isVeg"></span>
            <h4>{{ item.name }}</h4>
          </div>
          <p class="meal-desc" *ngIf="item.description">{{ item.description }}</p>
          <div class="meal-actions">
            <button class="icon-btn" (click)="openEdit(item)" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button class="icon-btn danger" (click)="deleteItem(item.id)" title="Delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Dinner Section -->
    <div class="meal-section">
      <div class="section-header">
        <h3>Dinner</h3>
        <button class="btn btn-outline-primary btn-sm" (click)="openAdd(2)">+ Add Item</button>
      </div>
      <div class="meal-grid">
        <div class="meal-card" *ngFor="let item of dinner">
          <div class="meal-info">
            <span class="diet-indicator" [class.veg]="item.isVeg" [class.nonveg]="!item.isVeg"></span>
            <h4>{{ item.name }}</h4>
          </div>
          <p class="meal-desc" *ngIf="item.description">{{ item.description }}</p>
          <div class="meal-actions">
            <button class="icon-btn" (click)="openEdit(item)" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button class="icon-btn danger" (click)="deleteItem(item.id)" title="Delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- SIMPLE MODAL -->
<div *ngIf="showModal" class="modal">
  <div class="modal-content">

    <h3>{{ isEdit ? 'Edit Item' : 'Add Item' }}</h3>

    <input type="text" [(ngModel)]="form.name" placeholder="Name" />
    <input type="text" [(ngModel)]="form.description" placeholder="Description" />

    <label>
      <input type="checkbox" [(ngModel)]="form.isVeg" />
      Vegetarian
    </label>

    <label>
      <input type="checkbox" [(ngModel)]="form.isAvailable" />
      Available
    </label>

    <div class="modal-actions">
      <button class="btn btn-outline-primary" (click)="showModal = false">Cancel</button>
      <button class="btn btn-primary" (click)="saveItem()">Save</button>
    </div>

  </div>
</div>
