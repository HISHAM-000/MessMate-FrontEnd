<div class="menu-day-container fade-in" *ngIf="!isLoading">

  <!-- NO MENU -->
  <div class="empty-state pop-in" *ngIf="!menuId">
    <div class="empty-icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
    </div>
    <h2>No Menu Created</h2>
    <p>You haven't set up a menu for this day yet.</p>
    <button class="btn-create pulse-hover" (click)="createMenu()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
      Create Menu
    </button>
  </div>

  <!-- MENU EXISTS -->
  <div class="menu-sections" *ngIf="menuId">
    
    <!-- Breakfast Section -->
    <div class="meal-section slide-up-stagger-1">
      <div class="section-header">
        <div class="sec-title-wrap">
          <div class="sec-icon breakfast-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 8h1a4 4 0 1 1 0 8h-1"/><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"/><line x1="6" x2="6" y1="2" y2="4"/><line x1="10" x2="10" y1="2" y2="4"/><line x1="14" x2="14" y1="2" y2="4"/></svg>
          </div>
          <h3>Breakfast</h3>
        </div>
        <button class="btn-add-item" (click)="openAdd(0)">+ Add Item</button>
      </div>
      <div class="meal-grid">
        <div class="food-card" *ngFor="let item of breakfast">
          <div class="f-diet" [ngClass]="item.isVeg ? 'f-veg' : 'f-nonveg'"></div>
          <div class="f-content">
            <h4>{{ item.name }}</h4>
            <p *ngIf="item.description">{{ item.description }}</p>
          </div>
          <div class="f-actions">
            <button class="f-btn f-edit" (click)="openEdit(item)" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button class="f-btn f-delete" (click)="deleteItem(item.id)" title="Delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
        </div>
        <div class="empty-meal" *ngIf="breakfast.length === 0">No items added</div>
      </div>
    </div>

    <!-- Lunch Section -->
    <div class="meal-section slide-up-stagger-2">
      <div class="section-header">
        <div class="sec-title-wrap">
          <div class="sec-icon lunch-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          </div>
          <h3>Lunch</h3>
        </div>
        <button class="btn-add-item" (click)="openAdd(1)">+ Add Item</button>
      </div>
      <div class="meal-grid">
        <div class="food-card" *ngFor="let item of lunch">
          <div class="f-diet" [ngClass]="item.isVeg ? 'f-veg' : 'f-nonveg'"></div>
          <div class="f-content">
            <h4>{{ item.name }}</h4>
            <p *ngIf="item.description">{{ item.description }}</p>
          </div>
          <div class="f-actions">
            <button class="f-btn f-edit" (click)="openEdit(item)" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button class="f-btn f-delete" (click)="deleteItem(item.id)" title="Delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
        </div>
        <div class="empty-meal" *ngIf="lunch.length === 0">No items added</div>
      </div>
    </div>

    <!-- Dinner Section -->
    <div class="meal-section slide-up-stagger-3">
      <div class="section-header">
        <div class="sec-title-wrap">
          <div class="sec-icon dinner-icon">
             <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"/><path d="m4.93 4.93 4.24 4.24"/><path d="m14.83 9.17 4.24-4.24"/><path d="M14.83 14.83 19.07 19.07"/><path d="m4.93 19.07 4.24-4.24"/></svg>
          </div>
          <h3>Dinner</h3>
        </div>
        <button class="btn-add-item" (click)="openAdd(2)">+ Add Item</button>
      </div>
      <div class="meal-grid">
        <div class="food-card" *ngFor="let item of dinner">
          <div class="f-diet" [ngClass]="item.isVeg ? 'f-veg' : 'f-nonveg'"></div>
          <div class="f-content">
            <h4>{{ item.name }}</h4>
            <p *ngIf="item.description">{{ item.description }}</p>
          </div>
          <div class="f-actions">
            <button class="f-btn f-edit" (click)="openEdit(item)" title="Edit">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            </button>
            <button class="f-btn f-delete" (click)="deleteItem(item.id)" title="Delete">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
            </button>
          </div>
        </div>
        <div class="empty-meal" *ngIf="dinner.length === 0">No items added</div>
      </div>
    </div>

  </div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" *ngIf="showModal" (click)="showModal = false">
  <div class="modal-content pop-in" (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h3>{{ isEdit ? 'Edit Item' : 'Add Item' }}</h3>
      <button class="close-btn" (click)="showModal = false">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="form-group">
      <label>Item Name</label>
      <input type="text" [(ngModel)]="form.name" placeholder="e.g. Paneer Butter Masala" class="m-input" />
    </div>

    <div class="form-group">
      <label>Description (Optional)</label>
      <input type="text" [(ngModel)]="form.description" placeholder="A brief description" class="m-input" />
    </div>

    <div class="modal-toggles">
      <label class="toggle-wrap">
        <input type="checkbox" [(ngModel)]="form.isVeg" class="custom-checkbox" />
        <span class="toggle-lbl">Vegetarian Item</span>
      </label>

      <label class="toggle-wrap">
        <input type="checkbox" [(ngModel)]="form.isAvailable" class="custom-checkbox" />
        <span class="toggle-lbl">Currently Available</span>
      </label>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="showModal = false">Cancel</button>
      <button class="btn-save pulse-hover" (click)="saveItem()">Save Item</button>
    </div>

  </div>
</div>
