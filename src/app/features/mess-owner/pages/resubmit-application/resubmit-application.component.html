<div class="resubmit-page">

  <div class="page-header">
    <div class="header-text">
      <h1>Resubmit Application</h1>
      <p>Update your details below to resubmit your mess application.</p>
    </div>
  </div>

  <div class="panel form-panel">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" [(ngModel)]="form.name" placeholder="Enter your full name" class="form-control" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" [(ngModel)]="form.email" placeholder="Enter your email address" class="form-control" />
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" [(ngModel)]="form.phoneNumber" placeholder="Enter phone number" class="form-control" />
    </div>

    <div class="form-group">
      <label>Authorized Person Name</label>
      <input type="text" [(ngModel)]="form.authorizedName" placeholder="Name of authorized person" class="form-control" />
    </div>

    <div class="form-group">
      <label>License Number</label>
      <input type="text" [(ngModel)]="form.licenseNumber" placeholder="Enter license number" class="form-control" />
    </div>

    <div class="form-actions">
      <button 
        class="btn btn-primary full-width" 
        (click)="submit()" 
        [disabled]="isLoading"
      >
        <span class="spinner" *ngIf="isLoading"></span>
        {{ isLoading ? 'Submitting Application...' : 'Submit Application' }}
      </button>
    </div>
  </div>

</div>
