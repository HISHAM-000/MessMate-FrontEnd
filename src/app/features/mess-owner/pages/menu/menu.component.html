<div class="menu-page">
  <div class="page-header">
    <div class="header-text">
      <h1>Weekly Menu</h1>
      <p>Manage your meal offerings for each day of the week</p>
    </div>
  </div>

  <div class="week-tabs-container">
    <nav class="week-tabs">
      <button *ngFor="let day of days"
              class="tab-btn"
              [routerLink]="['/owner/menu-day', day]"
              routerLinkActive="active">
        {{ day }}
      </button>
    </nav>
  </div>

  <div class="menu-content">
    <router-outlet></router-outlet>
  </div>
</div>
