<div class="layout">

  <!-- Sidebar — controlled by parent -->
  <app-sidebar [isCollapsed]="isSidebarCollapsed"></app-sidebar>

  <!-- Main Area -->
  <div class="main">

    <!-- Topbar — emits toggle event -->
    <app-topbar (toggleClicked)="toggleSidebar()"></app-topbar>

    <!-- Dynamic Page Loads Here -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </div>

</div>
