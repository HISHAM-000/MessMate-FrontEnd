<div class="deliveries">

  <h2>Active Deliveries</h2>

  <div *ngIf="deliveries.length === 0">
    <p>No active deliveries</p>
  </div>

  <div class="card" *ngFor="let d of deliveries">

    <h3>{{ d.messName }}</h3>

    <p>Date: {{ d.orderDate | date:'mediumDate' }}</p>
    <p>Status: {{ d.status }}</p>
    <p>Meal: {{ d.mealSlot }}</p>
    <p>Dish: {{ d.dishName }}</p>

  </div>

</div>
