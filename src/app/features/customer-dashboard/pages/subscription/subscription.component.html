<div class="subscription-page">

  <h2>My Subscriptions</h2>

  <div *ngIf="subscriptions.length === 0">
    <p>No subscriptions yet.</p>
  </div>

  <div class="card" *ngFor="let sub of subscriptions">

    <h3>{{ sub.planName }}</h3>

    <p>Status: <strong>{{ sub.status }}</strong></p>
    <p>Start: {{ sub.startDate }}</p>
    <p>End: {{ sub.endDate }}</p>

    <div class="actions">

      <button
        *ngIf="sub.status === 'Active'"
        (click)="openPauseModal(sub.id)">
        Pause
      </button>

      <button
        *ngIf="sub.status === 'Active'"
        (click)="cancel(sub.id)">
        Cancel
      </button>

    </div>

  </div>

</div>

<!-- 🔥 PAUSE MODAL -->
<div class="modal-backdrop" *ngIf="isPauseModalOpen">

  <div class="modal">

    <h3>Pause Subscription</h3>

    <label>From</label>
    <input type="date" [(ngModel)]="pauseFrom" />

    <label>Until</label>
    <input type="date" [(ngModel)]="pauseUntil" />

    <div class="modal-actions">
      <button (click)="pause()">Confirm</button>
      <button (click)="closePauseModal()">Cancel</button>
    </div>

  </div>

</div>
