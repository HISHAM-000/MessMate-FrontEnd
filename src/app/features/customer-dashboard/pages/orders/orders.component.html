<div class="p-8 max-w-6xl mx-auto fade-in">
  <div class="mb-8 slide-up stagger-1">
    <div class="flex items-center gap-4 mb-2">
      <div class="p-3 bg-gradient-to-br from-orange-100 to-orange-200 text-orange-600 rounded-2xl shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      </div>
      <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">My Orders</h1>
    </div>
    <p class="text-gray-500 ml-16 text-lg">View your past orders, invoices, and transaction history.</p>
  </div>

  <div class="bg-white rounded-[24px] shadow-xl shadow-orange-900/5 border border-gray-100 overflow-hidden slide-up stagger-2">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-gray-50/80 border-b border-gray-100 uppercase text-xs tracking-wider text-gray-500 font-bold">
            <th class="py-5 px-6">Order ID</th>
            <th class="py-5 px-6">Date</th>
            <th class="py-5 px-6">Items</th>
            <th class="py-5 px-6">Amount</th>
            <th class="py-5 px-6">Status</th>
            <th class="py-5 px-6 text-right">Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let order of orders; let i = index" 
              class="order-row border-b border-gray-50 hover:bg-orange-50/30 slide-up"
              [ngStyle]="{'animation-delay': (0.3 + i * 0.1) + 's'}">
            
            <td class="py-5 px-6">
              <span class="font-semibold text-gray-900">#{{ order.id }}</span>
            </td>
            
            <td class="py-5 px-6 text-gray-500 font-medium">
              <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                {{ order.date | date:'mediumDate' }}
              </div>
            </td>
            
            <td class="py-5 px-6 text-gray-600 text-sm">
              <div class="flex flex-col gap-1">
                <span *ngFor="let item of order.items" class="flex items-center gap-2">
                  <span class="w-1.5 h-1.5 rounded-full bg-orange-400"></span>
                  {{ item }}
                </span>
              </div>
            </td>
            
            <td class="py-5 px-6">
              <span class="font-extrabold text-gray-900 text-lg tracking-tight">₹{{ order.totalAmount }}</span>
            </td>
            
            <td class="py-5 px-6">
              <span class="status-badge px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider inline-flex items-center gap-1.5"
                    [ngClass]="{
                      'bg-green-100 text-green-700 ring-1 ring-green-600/20': order.status === 'Completed',
                      'bg-orange-100 text-orange-700 ring-1 ring-orange-600/20': order.status === 'Pending',
                      'bg-red-100 text-red-700 ring-1 ring-red-600/20': order.status === 'Failed'
                    }">
                <span class="w-1.5 h-1.5 rounded-full"
                      [ngClass]="{
                        'bg-green-500': order.status === 'Completed',
                        'bg-orange-500': order.status === 'Pending',
                        'bg-red-500': order.status === 'Failed'
                      }"></span>
                {{ order.status }}
              </span>
            </td>
            
            <td class="py-5 px-6 text-right">
              <button class="action-btn group inline-flex items-center gap-2 text-orange-600 hover:text-orange-700 font-semibold text-sm bg-orange-50 hover:bg-orange-100 px-4 py-2 rounded-xl transition-all duration-300">
                Invoice
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transform group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>
            </td>
            
          </tr>

          <!-- Empty State -->
          <tr *ngIf="orders.length === 0">
            <td colspan="6" class="py-16 text-center">
              <div class="flex flex-col items-center justify-center fade-in">
                <div class="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mb-4 text-gray-300">
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
                </div>
                <p class="text-gray-500 text-lg font-medium">No orders found.</p>
                <p class="text-gray-400 mt-1">When you place orders, they will appear here.</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
