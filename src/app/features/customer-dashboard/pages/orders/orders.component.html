<div class="orders">

  <h2>Orders</h2>

  <table>
    <tr>
      <th>ID</th>
      <th>Date</th>
      <th>Status</th>
      <th>Action</th>
    </tr>

    <tr *ngFor="let order of orders">

      <td>{{ order.id }}</td>
      <td>{{ order.orderDate | date:'mediumDate' }}</td>
      <td>{{ order.status }}</td>

      <td>

        <!-- ✅ Show Skip only for valid orders -->
        <button
          *ngIf="order.status === 'Pending'"
          (click)="skip(order.id)">
          Skip
        </button>

        <!-- Already skipped -->
        <span *ngIf="order.status === 'Skipped'">
          Skipped
        </span>

        <!-- Delivered -->
        <span *ngIf="order.status === 'Delivered'">
          Delivered
        </span>

        <!-- Other statuses -->
        <span *ngIf="order.status !== 'Pending' 
                     && order.status !== 'Delivered' 
                     && order.status !== 'Skipped'">
          {{ order.status }}
        </span>

      </td>

    </tr>

  </table>

</div>
