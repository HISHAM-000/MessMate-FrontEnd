<div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 space-y-6">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h2 class="text-3xl font-bold text-slate-800 tracking-tight">My Orders</h2>
      <p class="text-slate-500 mt-1">Manage your upcoming and past meals.</p>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="orders.length === 0" class="flex flex-col items-center justify-center p-12 bg-white rounded-2xl shadow-sm border border-slate-100 text-center mt-6">
    <div class="w-16 h-16 bg-primary-50 rounded-full flex items-center justify-center mb-4">
      <svg class="w-8 h-8 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
      </svg>
    </div>
    <h3 class="text-xl font-semibold text-slate-800 mb-2">No upcoming orders</h3>
    <p class="text-slate-500 max-w-md">You don't have any meals scheduled for today or the future.</p>
  </div>

  <!-- Orders Grid -->
  <div *ngIf="orders.length > 0" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mt-6">
    <div *ngFor="let order of orders" class="group relative bg-white rounded-2xl p-6 shadow-sm border border-slate-100 hover:shadow-md hover:border-primary-100 transition-all duration-300 flex flex-col h-full">
      
      <!-- Card Header: ID & Date -->
      <div class="flex justify-between items-start mb-4">
        <div>
          <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Order #{{ order.id }}</span>
          <h3 class="text-lg font-bold text-slate-800 mt-1 flex items-center gap-2">
            <svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
            </svg>
            {{ order.orderDate | date:'mediumDate' }}
          </h3>
        </div>
        
        <!-- Status Badge -->
        <span [ngClass]="{
          'bg-yellow-100 text-yellow-800 border-yellow-200': order.status === 'Pending',
          'bg-green-100 text-green-800 border-green-200': order.status === 'Delivered',
          'bg-rose-100 text-rose-800 border-rose-200': order.status === 'Skipped',
          'bg-slate-100 text-slate-800 border-slate-200': order.status !== 'Pending' && order.status !== 'Delivered' && order.status !== 'Skipped'
        }" class="px-3 py-1.5 text-xs font-bold rounded-full border tracking-wide shadow-sm">
          {{ order.status }}
        </span>
      </div>

      <!-- Spacer to push actions to the bottom -->
      <div class="flex-grow"></div>

      <!-- Divider -->
      <div class="w-full h-px bg-slate-100 my-4"></div>

      <!-- Action Area -->
      <div class="mt-auto">
        <button
          *ngIf="order.status === 'Pending'"
          (click)="skip(order.id)"
          class="w-full py-2.5 px-4 bg-white border-2 border-rose-500 text-rose-600 font-bold rounded-xl hover:bg-rose-50 hover:shadow-sm focus:outline-none focus:ring-4 focus:ring-rose-100 transition-all duration-200 flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          Skip This Meal
        </button>

        <div *ngIf="order.status !== 'Pending'" class="w-full py-2.5 px-4 bg-slate-50 text-slate-500 font-semibold rounded-xl text-center border border-slate-100 flex items-center justify-center gap-2">
          <span *ngIf="order.status === 'Skipped'">
            <svg class="w-5 h-5 inline-block mr-1 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"></path></svg>
            Meal Skipped
          </span>
          <span *ngIf="order.status === 'Delivered'">
            <svg class="w-5 h-5 inline-block mr-1 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            Meal Delivered
          </span>
          <span *ngIf="order.status !== 'Skipped' && order.status !== 'Delivered'">No Action Required</span>
        </div>
      </div>
      
    </div>
  </div>

</div>
