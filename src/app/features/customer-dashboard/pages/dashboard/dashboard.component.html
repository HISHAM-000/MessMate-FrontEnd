<div class="dashboard">

  <!-- 🔹 Summary Cards -->
  <app-summary-cards></app-summary-cards>

  <!-- 🔹 Active Subscription -->
 <div class="card subscription-card">

  <h3>Active Subscription</h3>

  <!-- No subscription -->
  <div *ngIf="!activeSub">
    <p>No active subscription</p>
  </div>

  <!-- Subscription details -->
  <div class="sub-details" *ngIf="activeSub">

    <p>
      <strong>Plan:</strong>
      {{ activeSub.planName }}
    </p>

    <p>
      <strong>Status:</strong>
      {{ activeSub.isPaused ? 'Paused' : activeSub.status }}
    </p>

    <p>
      <strong>Valid Till:</strong>
      {{ activeSub.endDate | date:'mediumDate' }}
    </p>

  </div>

  <!-- Actions -->
  <div class="actions" *ngIf="activeSub">

    <button (click)="goToSubscription()">
      Manage Subscription
    </button>

  </div>

</div>

  <!-- 🔹 Middle Section -->
  <div class="middle-section">

    <!-- Today Meal -->
    <div class="card">
      <app-today-meal></app-today-meal>
    </div>

    <!-- Quick Actions -->
    <div class="card quick-actions">

      <h3>Quick Actions</h3>

      <button (click)="openSkipModal()">Skip Today Meal</button>
      <button (click)="goToOrders()">View Orders</button>
      <button (click)="goToSubscription()">Manage Subscription</button>

    </div>

  </div>

  <!-- 🔹 Recent Orders -->
  <div class="card">
    <app-recent-order></app-recent-order>
  </div>

</div>
<div class="modal-backdrop" *ngIf="isSkipModalOpen">

  <div class="modal">

    <h3>Select Meal to Skip</h3>

    <div class="meal-list">

      <div class="meal-item" *ngFor="let order of todayOrders">

        <span>
          {{ getMealSlotName(order.mealSlot) }}
        </span>

        <button (click)="skipMeal(order.id)">
          Skip
        </button>

      </div>

    </div>

    <button class="close-btn" (click)="closeSkipModal()">
      Cancel
    </button>

  </div>

</div>
