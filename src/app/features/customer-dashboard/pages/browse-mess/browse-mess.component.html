<div class="mess-container">

  <div class="mess-card" *ngFor="let mess of messes">
    <h3>{{ mess.name }}</h3>
    <p class="location">{{ mess.location }}</p>
    <p class="desc">{{ mess.description }}</p>

    <button class="view-btn"
      [routerLink]="['/customer/mess-detail', mess.id]">
      View Details
    </button>
  </div>

</div>
