<div class="plan-detail" *ngIf="plan">

  <h2>{{ plan.name }}</h2>

  <p>Price: ₹{{ plan.price }}</p>
  <p>Duration: {{ plan.durationDays }} days</p>

  <div class="actions">
    <button (click)="openEnrollModal()">Enroll</button>
  </div>

</div>

<!-- 🔥 MODAL -->
<div class="modal-backdrop" *ngIf="isEnrollModalOpen">

  <div class="modal">

    <h3>Enter Delivery Details</h3>

    <input
      type="text"
      placeholder="Enter delivery address"
      [(ngModel)]="deliveryAddress"
    />

    <select [(ngModel)]="paymentMethod">
      <option [value]="2">Online Payment</option>
      <option [value]="1" disabled>Cash (Coming Soon)</option>
    </select>

    <div class="modal-actions">
      <button (click)="enroll()">Confirm</button>
      <button (click)="closeEnrollModal()">Cancel</button>
    </div>

  </div>

</div>
