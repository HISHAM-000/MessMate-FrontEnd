<div class="p-8" *ngIf="mess">
  <button (click)="goBack()" class="flex items-center text-orange-600 hover:text-orange-700 font-semibold mb-6 transition-colors">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    Back to Messes
  </button>

  <div class="bg-white rounded-3xl shadow-sm overflow-hidden mb-8">
    <div class="h-64 sm:h-80 w-full relative">
      <img [src]="mess.imageUrl" alt="{{ mess.name }}" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent"></div>
      <div class="absolute bottom-0 left-0 p-8 text-white">
        <div class="flex items-center gap-3 mb-2">
          <span class="bg-orange-500 text-white px-3 py-1 rounded-full text-sm font-bold flex items-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
              <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
            </svg>
            {{ mess.rating }}
          </span>
        </div>
        <h1 class="text-4xl font-extrabold mb-2">{{ mess.name }}</h1>
        <p class="text-gray-300 text-lg">{{ mess.description }}</p>
        <div class="mt-4 flex items-center text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
          </svg>
          {{ mess.address }}
        </div>
      </div>
    </div>
  </div>

  <div class="mb-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Available Plans</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div *ngFor="let plan of plans" class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm hover:shadow-lg transition-all duration-300 flex flex-col relative overflow-hidden">
        
        <!-- Type Badge -->
        <div class="absolute top-0 right-0 mt-4 mr-4 px-3 py-1 rounded-full text-xs font-bold"
             [ngClass]="{'bg-green-100 text-green-700': plan.type === 'Veg', 'bg-red-100 text-red-700': plan.type === 'Non-Veg', 'bg-yellow-100 text-yellow-700': plan.type === 'Both'}">
          {{ plan.type }}
        </div>

        <h3 class="text-xl font-bold text-gray-900 mb-2 w-3/4">{{ plan.name }}</h3>
        <p class="text-gray-500 text-sm mb-6 flex-grow">{{ plan.description }}</p>
        
        <div class="flex items-end justify-between mt-auto">
          <div>
            <p class="text-sm text-gray-500">Price</p>
            <p class="text-2xl font-black text-orange-600">₹{{ plan.pricePerMonth }}<span class="text-sm text-gray-500 font-normal">/mo</span></p>
          </div>
          <button (click)="viewPlan(plan.id)" class="bg-gray-900 text-white px-5 py-2.5 rounded-lg font-semibold hover:bg-orange-500 transition-colors shadow-md">
            View Schedule
          </button>
        </div>
      </div>
      
      <div *ngIf="plans.length === 0" class="col-span-full py-12 text-center text-gray-500 bg-gray-50 rounded-2xl border border-dashed border-gray-300">
        No plans currently available for this mess.
      </div>
    </div>
  </div>
</div>

<div class="p-8 flex justify-center items-center h-64" *ngIf="!mess">
  <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
</div>
