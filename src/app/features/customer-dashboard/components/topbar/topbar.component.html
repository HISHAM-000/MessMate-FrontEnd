<nav class="aesthetic-topbar">
  <div class="topbar-left">
    <button class="menu-toggle" (click)="toggleMenu()">
      <span style="display: flex; align-items: center; justify-content: center;">
        <svg style="width: 24px; height: 24px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </span>
    </button>
    <div class="search-container">
      <span class="search-icon" style="display: flex; align-items: center;">
        <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
      <input type="text" placeholder="Search users, issues, or IDs..." class="search-input">
      <span class="search-hint">Ctrl K</span>
    </div>
  </div>

  <div class="topbar-right">
    <div class="live-clock">
      <span class="clock-icon" style="display: flex; align-items: center;">
        <svg style="width: 20px; height: 20px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </span>
      <span class="time-text">{{ currentTime }}</span>
    </div>

    <div class="notification-trigger">
      <div class="notification-badge"></div>
      <span class="bell-icon" style="display: flex; align-items: center; justify-content: center;">
        <svg style="width: 22px; height: 22px;" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C10.8954 2 10 2.89543 10 4V4.11677C7.16434 4.58784 5 7.03732 5 10V14L3.60555 16.7889C3.15653 17.6869 3.80931 18.75 4.81442 18.75H19.1856C20.1907 18.75 20.8435 17.6869 20.3944 16.7889L19 14V10C19 7.03732 16.8357 4.58784 14 4.11677V4C14 2.89543 13.1046 2 12 2ZM9 20C9 21.6569 10.3431 23 12 23C13.6569 23 15 21.6569 15 20H9Z"/>
        </svg>
      </span>
    </div>

    <div class="profile-group" (click)="logout()">
      <div class="avatar-container">
        <div class="avatar-circle">
          {{ userInitials }}
        </div>
      </div>
      <div class="user-info">
        <span class="user-name">{{ customerName }}</span>
        <span class="user-status">Customer Profile</span>
      </div>
    </div>
  </div>
</nav>
