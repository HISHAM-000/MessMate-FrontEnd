<aside class="aesthetic-sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header" [style.justifyContent]="isCollapsed ? 'center' : 'space-between'" [style.padding]="isCollapsed ? '2rem 0' : '2rem 1.5rem'">
    <div class="logo-area" [style.justifyContent]="isCollapsed ? 'center' : 'flex-start'">
      <div class="logo-icon">M</div>
      <h2 class="logo-text" *ngIf="!isCollapsed">MessMate</h2>
    </div>
  </div>

  <nav class="sidebar-nav" [style.alignItems]="isCollapsed ? 'center' : 'stretch'">
    <div class="nav-section" [style.width]="isCollapsed ? 'auto' : '100%'">
      <p class="section-label" *ngIf="!isCollapsed">Main Menu</p>
      <ul [style.alignItems]="isCollapsed ? 'center' : 'stretch'">
        <li>
          <a routerLink="dashboard" routerLinkActive="active-link" class="nav-item" [style.justifyContent]="isCollapsed ? 'center' : 'flex-start'" [style.padding]="isCollapsed ? '0.75rem' : '0.75rem 1rem'">
            <span class="icon" style="display: flex;">
              <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </span>
            <span class="label" *ngIf="!isCollapsed">Dashboard</span>
          </a>
        </li>
        <li>
          <a routerLink="browse-mess" routerLinkActive="active-link" class="nav-item" [style.justifyContent]="isCollapsed ? 'center' : 'flex-start'" [style.padding]="isCollapsed ? '0.75rem' : '0.75rem 1rem'">
            <span class="icon" style="display: flex;">
              <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </span>
            <span class="label" *ngIf="!isCollapsed">Browse Mess</span>
          </a>
        </li>
        <li>
          <a routerLink="subscription" routerLinkActive="active-link" class="nav-item" [style.justifyContent]="isCollapsed ? 'center' : 'flex-start'" [style.padding]="isCollapsed ? '0.75rem' : '0.75rem 1rem'">
            <span class="icon" style="display: flex;">
              <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
            </span>
            <span class="label" *ngIf="!isCollapsed">Subscriptions</span>
          </a>
        </li>
      </ul>
    </div>

    <div class="nav-section" [style.width]="isCollapsed ? 'auto' : '100%'">
      <p class="section-label" *ngIf="!isCollapsed">Account</p>
      <ul [style.alignItems]="isCollapsed ? 'center' : 'stretch'">
        <li>
          <a routerLink="orders" routerLinkActive="active-link" class="nav-item" [style.justifyContent]="isCollapsed ? 'center' : 'flex-start'" [style.padding]="isCollapsed ? '0.75rem' : '0.75rem 1rem'">
            <span class="icon" style="display: flex;">
              <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </span>
            <span class="label" *ngIf="!isCollapsed">My Orders</span>
          </a>
        </li>
        <li>
          <a routerLink="deliveries" routerLinkActive="active-link" class="nav-item" [style.justifyContent]="isCollapsed ? 'center' : 'flex-start'" [style.padding]="isCollapsed ? '0.75rem' : '0.75rem 1rem'">
            <span class="icon" style="display: flex;">
              <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"></path></svg>
            </span>
            <span class="label" *ngIf="!isCollapsed">Deliveries</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="sidebar-footer" [style.padding]="isCollapsed ? '2rem 0' : '2rem 1rem'" [style.display]="'flex'" [style.justifyContent]="'center'">
    <button class="logout-action" (click)="logout()" [style.justifyContent]="isCollapsed ? 'center' : 'flex-start'" [style.padding]="isCollapsed ? '0.75rem' : '0.75rem 1rem'" [style.width]="isCollapsed ? 'auto' : '100%'">
      <span class="icon" style="display: flex; color: #ef4444;">
        <svg style="width: 22px; height: 22px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
      </span>
      <span class="label" *ngIf="!isCollapsed">Logout</span>
    </button>
  </div>
</aside>
