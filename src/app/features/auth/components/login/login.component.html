<div class="animate-fade-in-up transition-opacity duration-300">
  <div class="mb-8">
    <h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h2>
    <p class="text-sm text-gray-500">Please enter your details to sign in.</p>
  </div>

  <form [formGroup]="loginForm" class="space-y-5" (ngSubmit)="onSubmit()">
    <!-- Email Field -->
    <div>
      <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <div class="relative">
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          class="block w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm focus:border-primary-500 focus:bg-white focus:ring-2 focus:ring-primary-500/20 focus:outline-none transition-colors"
          [ngClass]="{'border-red-500 focus:border-red-500 focus:ring-red-500/20': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
          placeholder="Enter your email"
        >
      </div>
      <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-xs mt-1">
        <span *ngIf="loginForm.get('email')?.errors?.['required']">Email is required.</span>
        <span *ngIf="loginForm.get('email')?.errors?.['email']">Please enter a valid email.</span>
      </div>
    </div>

    <!-- Password Field -->
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <div class="relative group">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          id="password" 
          formControlName="password"
          class="block w-full rounded-xl border border-gray-200 bg-gray-50 px-4 py-3 text-sm focus:border-primary-500 focus:bg-white focus:ring-2 focus:ring-primary-500/20 focus:outline-none transition-colors"
          [ngClass]="{'border-red-500 focus:border-red-500 focus:ring-red-500/20': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
          placeholder="••••••••"
        >
        <button 
          type="button" 
          class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-400 hover:text-gray-600 focus:outline-none"
          (click)="togglePassword()">
          <svg *ngIf="!showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
          <svg *ngIf="showPassword" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
          </svg>
        </button>
      </div>
      <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-xs mt-1">
        <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
        <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 8 characters.</span>
      </div>
    </div>

    <!-- Forgot Password & Remember Me -->
    <div class="flex items-center justify-between text-sm">
      <div class="flex items-center">
        <input id="remember-me" formControlName="rememberMe" type="checkbox" class="h-4 w-4 rounded border-gray-300 text-primary-600 focus:ring-primary-500">
        <label for="remember-me" class="ml-2 block text-gray-700">Remember for 30 days</label>
      </div>
      <a href="#" class="font-medium text-primary-600 hover:text-primary-500 transition-colors">Forgot password?</a>
    </div>

    <!-- Submit Button -->
    <button 
      type="submit" 
      class="w-full flex justify-center items-center h-12 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-primary-500 hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all hover:-translate-y-0.5"
      [disabled]="isLoading || loginForm.invalid"
      [ngClass]="{'opacity-80 cursor-not-allowed hover:translate-y-0': isLoading || loginForm.invalid}">
      <span *ngIf="!isLoading">Sign in</span>
      <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
    </button>
  </form>

  <!-- Register Options -->
  <div class="mt-8 text-center text-sm text-gray-500">
    Don't have an account? 
    <div class="mt-3 flex justify-center gap-4">
      <a routerLink="/auth/register" class="font-medium text-primary-600 hover:text-primary-500">Register as Customer</a>
      <span class="text-gray-300">|</span>
      <a routerLink="/auth/register-owner" class="font-medium text-secondary-500 hover:text-secondary-600">Partner as Mess Owner</a>
    </div>
  </div>
</div>
